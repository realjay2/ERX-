<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERX Open Source</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        p {
            font-size: 1.1rem;
            color: #cfcfcf;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            padding: 14px 28px;
            border: 2px solid #fff;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s ease;
        }

        a:hover {
            background: #fff;
            color: #000;
        }

        .small {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ERX Open Source</h1>

        <p>
            All open-source files, loaders, and resources are available on GitHub.
        </p>

        <a href="https://github.com/realjay2/ERX-/tree/main/Open_Sourced" target="_blank">
            View Open Source Files
        </a>

        <div class="small">
            github.com/realjay2/ERX-
        </div>
    </div>
</body>
</html>
